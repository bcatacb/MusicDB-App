<html>
<head>
  <title>MusicDB Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/lucide-static@latest/dist/umd/lucide.js" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { primary: '#6366f1', secondary: '#8b5cf6' } } } }</script>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // Simplified DB hook (from src/lib/DB.js)
    const useMusicDB = () => {
      const [songs, setSongs] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        // Mock data for demo (replace with real DB)
        setTimeout(() => {
          setSongs([
            { id: 1, title: 'Midnight Drive', project: 'Neon Horizons', status: 'Writing', bpm: 120, tags: 'synthwave' },
            { id: 2, title: 'Broken Glass', project: 'Acoustic Sessions', status: 'Released', bpm: 85, tags: 'ballad' }
          ]);
          setLoading(false);
        }, 500);
      }, []);

      return { songs, loading };
    };

    // Stats Cards
    const StatsCard = ({ title, value, icon: Icon, color }) => (
      <div className="bg-white/80 backdrop-blur-xl p-6 rounded-2xl shadow-xl border border-white/20 hover:shadow-2xl transition-all duration-300">
        <div className="flex items-center justify-between">
          <div>
            <p className="text-sm font-medium text-gray-600 uppercase tracking-wide">{title}</p>
            <p className="text-3xl font-bold text-gray-900 mt-1">{value}</p>
          </div>
          <div className={`p-3 rounded-xl bg-gradient-to-r from-${color}-400 to-${color}-600 shadow-lg text-white`}>
            <Icon size={24} />
          </div>
        </div>
      </div>
    );

    // Song Card
    const SongCard = ({ song }) => (
      <div className="group bg-white/70 backdrop-blur-xl p-6 rounded-2xl shadow-lg border border-white/30 hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 hover:border-primary/50">
        <div className="flex items-start justify-between mb-4">
          <div>
            <h3 className="font-bold text-xl text-gray-900 group-hover:text-primary mb-1">{song.title}</h3>
            <p className="text-sm text-gray-600">{song.project} • {song.bpm} BPM</p>
          </div>
          <span className={`px-3 py-1 rounded-full text-xs font-semibold ${
            song.status === 'Released' ? 'bg-green-100 text-green-800' :
            song.status === 'Writing' ? 'bg-yellow-100 text-yellow-800' :
            'bg-blue-100 text-blue-800'
          }`}>
            {song.status}
          </span>
        </div>
        <div className="flex flex-wrap gap-2 mb-4">
          {song.tags?.split(',').map(tag => (
            <span key={tag} className="px-3 py-1 bg-gradient-to-r from-purple-400/20 to-indigo-400/20 text-purple-800 text-xs rounded-full border border-purple-200 backdrop-blur-sm">
              {tag.trim()}
            </span>
          ))}
        </div>
        <div className="flex gap-2">
          <button className="flex-1 bg-gradient-to-r from-primary to-secondary text-white px-4 py-2 rounded-xl font-medium hover:shadow-lg transition-all duration-200 flex items-center justify-center gap-2">
            Edit
          </button>
          <button className="p-2 text-gray-500 hover:text-primary hover:bg-primary/10 rounded-xl transition-all">
            ▶️ Play
          </button>
        </div>
      </div>
    );

    // Main Dashboard
    const Dashboard = () => {
      const { songs, loading } = useMusicDB();
      const stats = {
        total: songs.length,
        writing: songs.filter(s => s.status === 'Writing').length,
        released: songs.filter(s => s.status === 'Released').length,
        avgBPM: Math.round(songs.reduce((a, b) => a + b.bpm, 0) / songs.length) || 0
      };

      if (loading) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50 flex items-center justify-center">
            <div className="text-center">
              <div className="w-16 h-16 border-4 border-primary/20 border-t-primary rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-lg text-gray-600">Loading MusicDB...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50 p-8">
          {/* Header */}
          <div className="max-w-7xl mx-auto mb-12">
            <div className="flex items-center gap-4 mb-8">
              <div className="w-16 h-16 bg-gradient-to-r from-primary to-secondary rounded-2xl flex items-center justify-center shadow-lg">
                <svg className="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 20 20">
                  <path d="M13 2H7a2 2 0 00-2 2v12a2 2 0 002 2h6a2 2 0 002-2V4a2 2 0 00-2-2z" />
                </svg>
              </div>
              <div>
                <h1 className="text-4xl font-bold bg-gradient-to-r from-gray-900 to-gray-700 bg-clip-text text-transparent">MusicDB</h1>
                <p className="text-xl text-gray-600">Your production catalog at a glance</p>
              </div>
            </div>

            {/* Stats */}
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
              <StatsCard title="Total Tracks" value={stats.total} icon={() => <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M13 2H7a2 2 0 00-2 2v12a2 2 0 002 2h6a2 2 0 002-2V4a2 2 0 00-2-2z"/></svg>} color="indigo" />
              <StatsCard title="In Progress" value={stats.writing} icon={() => <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>} color="yellow" />
              <StatsCard title="Released" value={stats.released} icon={() => <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zM5 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zM11 5a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V5zm0 8a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>} color="green" />
              <StatsCard title="Avg BPM" value={stats.avgBPM} icon={() => <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clipRule="evenodd"/></svg>} color="purple" />
            </div>

            {/* Songs Grid */}
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
              {songs.map(song => <SongCard key={song.id} song={song} />)}
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>
